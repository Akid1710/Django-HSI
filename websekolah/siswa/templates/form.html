{% extends 'base.html' %}

{% block title %} {% if siswa %} Edit Data Siswa {% else %} Tambah Siswa Baru {% endif %} {% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6 mt-6">
    <h1 class="text-2xl font-bold text-slate-900 border-b border-slate-200 pb-3 mb-6">
        {% if siswa %} Edit Data: {{ siswa.nama }} {% else %} Tambah Siswa Baru {% endif %}
    </h1>

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Nama Siswa</label>
            <input type="text" name="nama" required
                   value="{{ siswa.nama|default:'' }}"
                   placeholder="Masukkan nama lengkap"
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Umur (Tahun)</label>
            <input type="number" name="umur" required
                   value="{{ siswa.umur|default:'' }}"
                   placeholder="Contoh: 15"
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>

        <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Lahir</label>
    <input type="date" name="tgl_lahir" required
           value="{{ siswa.tgl_lahir|date:'Y-m-d' }}"
           class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
</div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Status Kehadiran</label>
            <select name="status_hadir" 
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white">
                <option value="True" {% if siswa.status_hadir == 'True' or siswa.status_hadir == True %} selected {% endif %}>Hadir (True)</option>
                <option value="False" {% if siswa.status_hadir == 'False' or siswa.status_hadir == False %} selected {% endif %}>Absen/Tidak Hadir (False)</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Nilai Akhir</label>
            <input type="number" name="nilai_akhir" step="0.01"
                   value="{{ siswa.nilai_akhir|default:'' }}"
                   placeholder="Contoh: 90"
                   class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>

        <div class="flex justify-end space-x-2 pt-4 border-t border-slate-100 mt-6">
            <a href="{% url 'siswa_list' %}" class="px-4 py-2 border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-50 text-sm font-medium transition">
                Batal
            </a>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium transition">
                {% if siswa %} Simpan Perubahan {% else %} Tambahkan {% endif %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
