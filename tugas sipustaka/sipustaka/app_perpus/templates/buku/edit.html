{% extends 'base.html' %}
{% block content %}
<div class="mb-6 flex items-center gap-3">
    <a href="{% url 'list_buku' %}" class="text-gray-400 hover:text-gray-600 text-xl font-bold transition">←</a>
    <div>
        <p class="text-xs text-gray-400 font-medium">Kelola Buku</p>
        <h1 class="text-2xl font-bold text-gray-800">Edit Buku</h1>
    </div>
</div>

<div class="bg-white rounded-2xl border border-gray-100 p-8 max-w-4xl shadow-xs">
    <form method="POST" class="space-y-5">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-wider">Judul Buku</label>
                <input type="text" name="judul" value="{{ buku.judul }}" required class="w-full border border-gray-200 rounded-xl p-3 text-sm font-medium text-gray-800 bg-gray-50/30 focus:bg-white focus:outline-blue-500 transition">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-wider">Pengarang</label>
                <input type="text" name="pengarang" value="{{ buku.pengarang }}" required class="w-full border border-gray-200 rounded-xl p-3 text-sm font-medium text-gray-800 bg-gray-50/30 focus:bg-white focus:outline-blue-500 transition">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-wider">Kategori</label>
                <select name="kategori" class="w-full border border-gray-200 rounded-xl p-3 text-sm font-medium text-gray-800 bg-gray-50/30 focus:bg-white focus:outline-blue-500 transition">
                    <option value="Novel" {% if buku.kategori == 'Novel' %}selected{% endif %}>Novel</option>
                    <option value="Sejarah" {% if buku.kategori == 'Sejarah' %}selected{% endif %}>Sejarah</option>
                    <option value="Pendidikan" {% if buku.kategori == 'Pendidikan' %}selected{% endif %}>Pendidikan</option>
                </select>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-wider">Penerbit</label>
                <input type="text" name="penerbit" value="{{ buku.penerbit }}" required class="w-full border border-gray-200 rounded-xl p-3 text-sm font-medium text-gray-800 bg-gray-50/30 focus:bg-white focus:outline-blue-500 transition">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-wider">Tahun Terbit</label>
                <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit }}" required class="w-full border border-gray-200 rounded-xl p-3 text-sm font-medium text-gray-800 bg-gray-50/30 focus:bg-white focus:outline-blue-500 transition">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-wider">Stok</label>
                <input type="number" name="stok" value="{{ buku.stok }}" required class="w-full border border-gray-200 rounded-xl p-3 text-sm font-medium text-gray-800 bg-gray-50/30 focus:bg-white focus:outline-blue-500 transition">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-wider">ISBN</label>
                <input type="text" name="isbn" value="{{ buku.isbn|default:'-' }}" required class="w-full border border-gray-200 rounded-xl p-3 text-sm font-mono text-gray-800 bg-gray-50/30 focus:bg-white focus:outline-blue-500 transition">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-wider">Rak / Lokasi</label>
                <select name="rak" class="w-full border border-gray-200 rounded-xl p-3 text-sm font-medium text-gray-800 bg-gray-50/30 focus:bg-white focus:outline-blue-500 transition">
                    <option value="Rak A-01" {% if buku.rak == 'Rak A-01' %}selected{% endif %}>Rak A-01</option>
                    <option value="Rak A-02" {% if buku.rak == 'Rak A-02' %}selected{% endif %}>Rak A-02</option>
                    <option value="Rak A-03" {% if buku.rak == 'Rak A-03' %}selected{% endif %}>Rak A-03</option>
                </select>
            </div>
            
            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-wider">Deskripsi</label>
                <textarea name="deskripsi" rows="4" class="w-full border border-gray-200 rounded-xl p-3 text-sm font-medium text-gray-800 bg-gray-50/30 focus:bg-white focus:outline-blue-500 transition">{{ buku.deskripsi }}</textarea>
            </div>
        </div>
        
        <div class="flex justify-end gap-3 pt-5 border-t border-gray-50">
            <a href="{% url 'list_buku' %}" class="px-6 py-2.5 rounded-xl text-sm border border-gray-200 text-gray-500 font-medium hover:bg-gray-50 transition">Batal</a>
            <button type="submit" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-semibold shadow-sm transition">Perbarui Buku</button>
        </div>
    </form>
</div>
{% endblock %}
