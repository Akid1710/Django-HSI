{% extends 'base.html' %}
{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Edit Profil Anggota</h1>
</div>
<div class="bg-white rounded-2xl border border-gray-100 p-8 max-w-xl shadow-xs">
    <form method="POST" class="space-y-5">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Nama Lengkap</label>
            <input type="text" name="nama" value="{{ siswa.nama }}" required class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-blue-500">
        </div>
        <div>
            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Kelas</label>
            <input type="text" name="kelas" value="{{ siswa.kelas }}" required class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-blue-500">
        </div>
        <div>
            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Nomor Induk Siswa (NIS)</label>
            <input type="text" name="nis" value="{{ siswa.nis }}" required class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-blue-500">
        </div>
        <div>
            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Status Akun</label>
            <select name="is_active" class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-blue-500">
                <option value="true" {% if siswa.is_active %}selected{% endif %}>Aktif (True)</option>
                <option value="false" {% if not siswa.is_active %}selected{% endif %}>Tidak Aktif (False)</option>
            </select>
        </div>
        <div class="flex justify-end gap-3 pt-4 border-t border-gray-50">
            <a href="{% url 'list_siswa' %}" class="px-5 py-2.5 rounded-xl text-sm border border-gray-200 text-gray-500">Batal</a>
            <button type="submit" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-semibold">Update Anggota</button>
        </div>
    </form>
</div>
{% endblock %}
