{% extends 'base.html' %}
{% block content %}
<div class="mb-6 flex items-center gap-3">
    <a href="{% url 'list_siswa' %}" class="text-gray-400 hover:text-gray-600 text-xl">←</a>
    <div>
        <p class="text-xs text-gray-400 font-medium">Kelola User</p>
        <h1 class="text-2xl font-bold text-gray-800">Hapus User</h1>
    </div>
</div>

<div class="bg-white rounded-2xl border border-gray-100 p-8 max-w-2xl shadow-xs space-y-6">
    <div>
        <p class="text-sm text-gray-500">Anda akan menghapus:</p>
        <p class="text-lg font-bold text-gray-900 mt-1">{{ siswa.nama }}</p>
        <p class="text-xs text-gray-400 mt-1">Data user akan dihapus dari daftar anggota perpustakaan.</p>
    </div>
    
    <form method="POST" class="flex justify-end gap-3 pt-4 border-t border-gray-50">
        {% csrf_token %}
        <a href="{% url 'list_siswa' %}" class="px-6 py-2.5 rounded-xl text-sm border border-gray-200 text-gray-500 font-medium hover:bg-gray-50 transition">Batal</a>
        <button type="submit" class="px-6 py-2.5 bg-rose-600 hover:bg-rose-700 text-white rounded-xl text-sm font-semibold transition">Hapus</button>
    </form>
</div>
{% endblock %}
