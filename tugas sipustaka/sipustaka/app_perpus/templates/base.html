<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPUSTAKA - Sistem Perpustakaan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden font-sans">
    <div class="w-64 bg-slate-950 text-white flex flex-col justify-between shadow-lg">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="bg-blue-600 rounded-full p-2 w-10 h-10 flex items-center justify-center font-bold text-white text-lg">P</div>
                <div>
                    <h1 class="text-xs text-gray-400 tracking-wider font-bold">SIPUSTAKA</h1>
                    <p class="font-semibold text-xs text-gray-200">Sistem Informasi Perpustakaan</p>
                </div>
            </div>
            <nav class="mt-6 px-4 space-y-1">
    <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition {% if request.resolver_match.url_name == 'dashboard' %} bg-slate-900 text-blue-400 font-semibold {% else %} text-slate-400 hover:bg-slate-900/50 hover:text-slate-200 {% endif %}">
        <span>📊</span> Dashboard
    </a>

    <a href="{% url 'list_buku' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition {% if request.resolver_match.url_name == 'list_buku' or 'buku' in request.path %} bg-slate-900 text-blue-400 font-semibold {% else %} text-slate-400 hover:bg-slate-900/50 hover:text-slate-200 {% endif %}">
        <span>📖</span> Buku
    </a>

    <a href="{% url 'list_peminjaman' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition {% if request.resolver_match.url_name == 'list_peminjaman' or 'peminjaman' in request.path %} bg-slate-900 text-blue-400 font-semibold {% else %} text-slate-400 hover:bg-slate-900/50 hover:text-slate-200 {% endif %}">
        <span>📋</span> Peminjaman
    </a>

    <a href="{% url 'list_siswa' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition {% if request.resolver_match.url_name == 'list_siswa' or 'siswa' in request.path %} bg-slate-900 text-blue-400 font-semibold {% else %} text-slate-400 hover:bg-slate-900/50 hover:text-slate-200 {% endif %}">
        <span>👥</span> User
    </a>
</nav>
        </div>
        <div class="p-6 border-t border-slate-900 bg-slate-950/50">
            <p class="text-xs text-gray-500 font-medium">Petugas Aktif</p>
            <p class="font-semibold text-sm text-blue-400">Jang Soo-Ha</p>
        </div>
    </div>
    <div class="flex-1 flex flex-col overflow-y-auto p-10">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
